syntax = "proto3";
option go_package = "0voiceGateWay/services/goods/proto";
package goods_voice;
message GetGoodsReq{
  int64 goodsId = 1;
}
message GetGoodsRes {
  int64 goodsId=1;
  string goodsName = 2;
  string goodsCategory = 3;
}
service Goods {
  rpc Get(GetGoodsReq)returns(GetGoodsRes){}
}
